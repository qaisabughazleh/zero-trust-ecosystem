name: Zero-Trust Ecosystem — CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/zero-trust

jobs:
  # ── 1. Test & Security Scan ──────────────────────────────────────────────────
  test:
    name: Test & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gateway/package-lock.json

      - name: Install gateway deps
        run: cd gateway && npm ci

      - name: Run gateway tests
        run: cd gateway && npm test --if-present

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AI engine deps
        run: cd ai-engine && pip install -r requirements.txt

      - name: Run AI engine tests
        run: cd ai-engine && python -m pytest tests/ -v --if-present 2>/dev/null || echo "No tests yet"

      # OPA policy tests
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa && sudo mv opa /usr/local/bin/

      - name: Test OPA policies
        run: opa test policy-engine/policies/ -v

      # Security scanning
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high --file=gateway/package.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true   # don't block deploy on Snyk issues

  # ── 2. Build & Push Docker Images ───────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - { name: gateway,       context: ./gateway,          dockerfile: ./gateway/Dockerfile }
          - { name: student-svc,   context: ./services/student, dockerfile: ./services/student/Dockerfile }
          - { name: professor-svc, context: ./services/professor,dockerfile: ./services/professor/Dockerfile }
          - { name: visitor-svc,   context: ./services/visitor,  dockerfile: ./services/visitor/Dockerfile }
          - { name: admin-svc,     context: ./services/admin,    dockerfile: ./services/admin/Dockerfile }
          - { name: ai-engine,     context: ./ai-engine,         dockerfile: ./ai-engine/Dockerfile }
          - { name: log-service,   context: ./logging,           dockerfile: ./logging/Dockerfile }

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:latest
          severity: "CRITICAL"
          exit-code: "1"
        continue-on-error: true

  # ── 3. Deploy to Staging ─────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://staging-api.YOUR_DOMAIN

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Update image tags
        run: |
          SHA=${{ github.sha }}
          SHORT=${SHA:0:7}
          sed -i "s|:latest|:staging-${SHORT}|g" k8s/**/*.yaml

      - name: Deploy to staging namespace
        run: |
          kubectl apply -f k8s/base/ -n zero-trust-staging
          kubectl apply -f k8s/gateway/ -n zero-trust-staging
          kubectl apply -f k8s/services/ -n zero-trust-staging
          kubectl rollout status deployment/zt-gateway -n zero-trust-staging --timeout=120s

      - name: Run smoke tests
        run: |
          GATEWAY=https://staging-api.YOUR_DOMAIN
          # Health check
          curl -sf $GATEWAY/health || exit 1
          # Auth endpoint
          TOKEN=$(curl -sf -X POST $GATEWAY/api/auth/token \
            -H "Content-Type: application/json" \
            -d '{"username":"student@uni.edu","password":"student123"}' | jq -r .access_token)
          [ "$TOKEN" != "null" ] || exit 1
          echo "Smoke tests passed"

  # ── 4. Deploy to Production ───────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.YOUR_DOMAIN

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

      - name: Deploy with rolling update
        run: |
          SHA=${{ github.sha }}
          SHORT=${SHA:0:7}
          # Update all deployments to new image
          for svc in gateway student-svc professor-svc visitor-svc admin-svc ai-engine log-service; do
            kubectl set image deployment/zt-$svc $svc=ghcr.io/${{ github.repository_owner }}/zero-trust/$svc:main-${SHORT} \
              -n zero-trust
          done

          # Wait for all rollouts
          kubectl rollout status deployment/zt-gateway -n zero-trust --timeout=180s
          kubectl rollout status deployment/zt-ai-engine -n zero-trust --timeout=180s

      - name: Production smoke test
        run: |
          sleep 15  # let LB settle
          GATEWAY=https://api.YOUR_DOMAIN
          curl -sf $GATEWAY/health
          ROLES=$(curl -sf $GATEWAY/api/auth/roles | jq '.roles | keys | length')
          [ "$ROLES" -eq "4" ] || exit 1
          echo "Production deployment verified"

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Zero-Trust Ecosystem deployed to production — commit ${{ github.sha }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        if: always()

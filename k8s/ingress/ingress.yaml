# ──────────────────────────────────────────────────────────────────────────────
# Kubernetes Ingress — Public API Endpoint
# Uses: ingress-nginx + cert-manager (Let's Encrypt)
#
# Replace YOUR_DOMAIN with your actual domain, e.g.: api.youruni.com
# ──────────────────────────────────────────────────────────────────────────────

# cert-manager ClusterIssuer — Let's Encrypt production
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: devops@YOUR_DOMAIN
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# TLS Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: zt-api-tls
  namespace: zero-trust
spec:
  secretName: zt-api-tls-secret
  duration: 2160h       # 90 days
  renewBefore: 360h     # renew 15 days before expiry
  subject:
    organizations: ["Zero Trust University"]
  dnsNames:
    - api.YOUR_DOMAIN
    - "*.api.YOUR_DOMAIN"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
---
# Main Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zt-gateway-ingress
  namespace: zero-trust
  annotations:
    # nginx controller
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Rate limiting (complements Redis rate limit in the gateway)
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/limit-rpm: "1000"

    # CORS — set to your frontend domain in production
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://YOUR_DOMAIN"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Request-ID"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'" always;

    # Request size limits
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"

    # cert-manager TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.YOUR_DOMAIN
      secretName: zt-api-tls-secret
  rules:
    - host: api.YOUR_DOMAIN
      http:
        paths:
          # All traffic routed through the gateway
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zt-gateway-svc
                port:
                  number: 8080
---
# Public routes whitelist (bypass auth at nginx level for /api/auth/*)
# The gateway still validates all requests internally
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zt-public-ingress
  namespace: zero-trust
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Lighter rate limit on auth endpoints (prevent credential stuffing)
    nginx.ingress.kubernetes.io/limit-rps: "5"
    nginx.ingress.kubernetes.io/limit-rpm: "100"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.YOUR_DOMAIN
      secretName: zt-api-tls-secret
  rules:
    - host: api.YOUR_DOMAIN
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: zt-gateway-svc
                port:
                  number: 8080
          - path: /health
            pathType: Exact
            backend:
              service:
                name: zt-gateway-svc
                port:
                  number: 8080

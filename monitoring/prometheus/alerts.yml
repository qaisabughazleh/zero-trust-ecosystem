groups:
  - name: zero-trust-security
    interval: 30s
    rules:
      # High denial rate — possible attack or misconfiguration
      - alert: HighDenialRate
        expr: |
          rate(zt_gateway_requests_denied_total[5m]) /
          (rate(zt_gateway_requests_allowed_total[5m]) + rate(zt_gateway_requests_denied_total[5m])) > 0.3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High request denial rate ({{ $value | humanizePercentage }})"
          description: "More than 30% of requests are being denied in the last 5 minutes."

      # Burst of auth failures — brute force attempt
      - alert: AuthFailureBurst
        expr: rate(zt_gateway_auth_failures_total[1m]) * 60 > 20
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Auth failure burst detected"
          description: "More than 20 auth failures per minute — possible brute force."

      # Gateway down
      - alert: GatewayDown
        expr: up{job="gateway"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "API Gateway is down"

      # AI engine down
      - alert: AIEngineDown
        expr: up{job="ai-engine"} == 0
        for: 1m
        labels:
          severity: high
        annotations:
          summary: "AI engine unavailable — risk scoring degraded"

      # OPA down — policy evaluation impossible
      - alert: OPADown
        expr: up{job="opa"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "OPA policy engine is down — all requests being denied"

      # High risk score traffic
      - alert: HighRiskTrafficSpike
        expr: histogram_quantile(0.95, rate(zt_ai_risk_score_bucket[5m])) > 0.7
        for: 2m
        labels:
          severity: high
        annotations:
          summary: "95th percentile risk score above 0.7"
          description: "Sustained high-risk traffic detected by AI engine."

      # Session re-auth rate spike
      - alert: ReauthSpike
        expr: rate(zt_gateway_reauth_required_total[5m]) * 300 > 50
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Unusual volume of re-authentication requirements"
